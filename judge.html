<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Judge</title><link rel="stylesheet" href="assets/public.css"></head><body><main class="public"><div class="mini-brand">DANCEFLOW JUDGE</div><h1 id="event">Select Event</h1><select id="evt"></select><div id="judgeList"></div></main><script>const db=JSON.parse(localStorage.getItem('danceflow_db_v1')||'{"competitions":[]}'),c=db.competitions[0];if(c){c.timetable.filter(x=>x.no).forEach(x=>evt.innerHTML+=`<option value="${x.id}">EVENT ${x.no} · ${x.name}</option>`);function r(){let x=c.timetable.find(z=>z.id===evt.value);event.textContent=x?`EVENT ${x.no} · ${x.round} · ${x.name}`:'Select Event';judgeList.innerHTML=c.judges.filter(j=>j.active).map(j=>`<article><strong>${j.code}</strong> ${j.name} · ${j.country}</article>`).join('')}evt.onchange=r;r()}</script></body></html>
