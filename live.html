<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LIVE</title><style>body{margin:0;background:#05070a;color:white;font-family:Arial;display:grid;place-items:center;height:100vh}.box{text-align:center;padding:40px}.brand{letter-spacing:.3em;color:#8c98aa}.no{font-size:30px;color:#aab6c6}.name{font-size:64px;font-weight:800;margin:18px 0}.meta{font-size:24px;color:#cbd5e1}select{padding:12px;font-size:18px}</style></head><body><div class=box><div class=brand>DANCEFLOW LIVE</div><p><select id=evt></select></p><div class=no id=no></div><div class=name id=name></div><div class=meta id=meta></div></div><script src="assets/apdc-data.js"></script><script>let db;try{db=JSON.parse(localStorage.getItem('danceflow_db_v1')||'null')}catch(e){db=null}if(!db||!db.competitions||!db.competitions.length){db=structuredClone(window.DANCEFLOW_SEED||{competitions:[]});localStorage.setItem('danceflow_db_v1',JSON.stringify(db))}const c=db.competitions[0];if(c){c.timetable.filter(x=>x.no).forEach(x=>evt.innerHTML+=`<option value="${x.id}">EVENT ${x.no}</option>`);function r(){let x=c.timetable.find(z=>z.id===evt.value);if(x){no.textContent='EVENT '+x.no+' · '+x.round;name.textContent=x.name;meta.textContent=x.dance||''}}evt.onchange=r;r()}</script></body></html>
