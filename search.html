<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entry Search</title><link rel="stylesheet" href="assets/public.css"></head><body><main class="public"><div class="mini-brand">DANCEFLOW</div><h1 id="title">Entry Search</h1><p id="meta"></p><input id="q" placeholder="Search name or back number"><div id="results"></div></main><script src="assets/apdc-data.js"></script><script src="assets/apdc-data.js"></script><script>
let db;try{db=JSON.parse(localStorage.getItem('danceflow_db_apdc_v4')||'null')}catch(e){db=null}if(!db||!db.competitions||!db.competitions.length){db=structuredClone(window.DANCEFLOW_SEED||{competitions:[]});localStorage.setItem('danceflow_db_v1',JSON.stringify(db))}const c=db.competitions[0];if(c){title.textContent=c.name;meta.textContent=[c.date,c.venue,c.city].filter(Boolean).join(' · ')}
function render(){let s=q.value.toLowerCase();results.innerHTML=!c?'No competition data':c.entries.filter(e=>!s||Object.values(e).join(' ').toLowerCase().includes(s)).map(e=>`<article><div class="back">${e.back}</div><div><h3>${e.player}</h3><p>${e.age} · ${e.style}</p><strong>${e.event}</strong></div></article>`).join('')}q.oninput=render;render();</script></body></html>
