<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MC Control</title><link rel="stylesheet" href="assets/public.css"></head><body><main class="public"><div class="mini-brand">DANCEFLOW MC</div><h1>MC Control</h1><div id="rows"></div></main><script>const db=JSON.parse(localStorage.getItem('danceflow_db_v1')||'{"competitions":[]}'),c=db.competitions[0];if(c)rows.innerHTML=c.timetable.map(x=>`<article><div class=back>${x.no||'—'}</div><div><b>${x.time}</b><h3>${x.name}</h3><p>${x.round} · ${x.dance||''}</p></div></article>`).join('')</script></body></html>
